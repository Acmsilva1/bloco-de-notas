<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTAS FINANCEIRAS PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/552/552791.png">

    <link rel="manifest" href='data:application/manifest+json,{"name":"Financeiro André","short_name":"Notas","start_url":"/","display":"standalone","background_color":"#111827","theme_color":"#111827","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/552/552791.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: ui-sans-serif, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; }
        .status-btn { font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 6px; width: 85px; }
        .pendente { background: #7f1d1d; color: #fecaca; }
        .pago { background: #064e3b; color: #d1fae5; }
        #loader { position: fixed; inset: 0; background: #111827; display: none; align-items: center; justify-content: center; z-index: 200; color: #60a5fa; }
    </style>
</head>
<body class="p-4">

    <div id="loader">SINCRONIZANDO...</div>

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <select id="month-select" onchange="fetchData()" class="bg-transparent text-blue-400 font-bold border-none outline-none">
                <option value="Janeiro">JANEIRO</option>
                </select>
            <div id="save-status" class="text-[10px] font-black text-green-500 opacity-0 uppercase">Sincronizado</div>
        </div>

        <div class="card shadow-2xl mb-6 overflow-hidden">
            <table class="w-full text-sm">
                <tbody id="list-container"></tbody>
            </table>
            <div class="p-4 border-t border-gray-700/50 flex justify-between items-center bg-gray-800/30">
                <button onclick="addRow()" class="text-blue-400 text-xs font-black uppercase">+ Novo</button>
                <button onclick="openImportModal()" class="text-purple-400 text-[10px] font-black uppercase">📥 Importar</button>
            </div>
        </div>

        <div id="total-val" class="text-right text-4xl font-mono font-black text-blue-400">R$ 0,00</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzRmEGyiMFnAAAuLQl9QDdi2JYN4q_v2puE0YX7l8eIKtuE81UvEcj7YDRQlscASqG3yg/exec"; // ATUALIZE SEMPRE APÓS NOVO DEPLOY

        // SERVICE WORKER REAL: Essencial para o botão de instalar aparecer
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'text/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .then(() => console.log("PWA Pronto"))
                    .catch(() => console.log("Erro PWA"));
            });
        }

        // ... (Suas funções fetchData, addRow, etc. continuam aqui)
        // Lembre-se de usar a lógica de salvar e buscar que já funciona.
    </script>
</body>
</html>
