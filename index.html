<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTAS FINANCEIRAS PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Notas André">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#111827">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; }
        input { background: transparent; border: none; outline: none; width: 100%; color: white; padding: 12px; font-size: 16px; }
        .status-btn { font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 6px; width: 85px; transition: all 0.2s; border: none; cursor: pointer; }
        .pendente { background: #7f1d1d; color: #fecaca; }
        .pago { background: #064e3b; color: #d1fae5; }
        #loader { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.9); display: none; align-items: center; justify-content: center; z-index: 100; font-style: italic; color: #60a5fa; font-weight: bold; }
        select { background: #111827; color: #60a5fa; border: 1px solid #374151; padding: 8px; border-radius: 8px; font-weight: bold; appearance: none; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader">SINCRONIZANDO COM A NUVEM...</div>

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <select id="month-select" onchange="fetchData()">
                <option value="Janeiro">JANEIRO</option>
                <option value="Fevereiro">FEVEREIRO</option>
                <option value="Março">MARÇO</option>
                <option value="Abril">ABRIL</option>
                <option value="Maio">MAIO</option>
                <option value="Junho">JUNHO</option>
                <option value="Julho">JULHO</option>
                <option value="Agosto">AGOSTO</option>
                <option value="Setembro">SETEMBRO</option>
                <option value="Outubro">OUTUBRO</option>
                <option value="Novembro">NOVEMBRO</option>
                <option value="Dezembro">DEZEMBRO</option>
            </select>
            <div id="save-status" class="text-[10px] font-black text-green-500 opacity-0 uppercase tracking-widest">Sincronizado</div>
        </div>

        <div class="card shadow-2xl mb-6 overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-900/50 text-[10px] text-gray-500 uppercase">
                    <tr>
                        <th class="p-4 text-left">Descrição</th>
                        <th class="p-4 text-right w-28">Valor</th>
                        <th class="p-4 text-center w-24">Status</th>
                        <th class="w-10"></th>
                    </tr>
                </thead>
                <tbody id="list-container"></tbody>
            </table>
            
            <div class="p-4 border-t border-gray-700/50 flex flex-wrap justify-between items-center gap-4">
                <button onclick="addRow()" class="text-blue-400 text-xs font-black uppercase hover:text-blue-300 transition-colors">+ Novo Registro</button>
                
                <div class="flex items-center gap-2 bg-gray-900/30 p-1 rounded-lg border border-gray-700/50">
                    <select id="import-month-select" class="text-[9px] py-1 px-2 border-none bg-transparent">
                        <option value="">IMPORTAR DE...</option>
                        <option value="Janeiro">JAN</option><option value="Fevereiro">FEV</option>
                        <option value="Março">MAR</option><option value="Abril">ABR</option>
                        <option value="Maio">MAI</option><option value="Junho">JUN</option>
                        <option value="Julho">JUL</option><option value="Agosto">AGO</option>
                        <option value="Setembro">SET</option><option value="Outubro">OUT</option>
                        <option value="Novembro">NOV</option><option value="Dezembro">DEZ</option>
                    </select>
                    <button onclick="importMonthData()" class="bg-blue-600 text-white text-[9px] font-black py-1 px-3 rounded uppercase hover:bg-blue-500 transition-all">OK</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card p-4 border-l-4 border-l-green-600">
                <span class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Pago</span>
                <div id="total-pago" class="text-xl font-mono font-bold text-green-400">R$ 0,00</div>
            </div>
            <div class="card p-4 border-l-4 border-l-red-600">
                <span class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Pendente</span>
                <div id="total-pendente" class="text-xl font-mono font-bold text-red-400">R$ 0,00</div>
            </div>
        </div>

        <div class="flex flex-col items-end px-2">
            <span id="total-val" class="text-4xl font-mono font-black text-blue-400">R$ 0,00</span>
        </div>

        <p class="text-[8px] text-gray-600 mt-12 text-center uppercase tracking-widest leading-relaxed">
            André Tech Solutions • LGPD Compliance • Google Sheets DB
        </p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzRmEGyiMFnAAAuLQl9QDdi2JYN4q_v2puE0YX7l8eIKtuE81UvEcj7YDRQlscASqG3yg/exec"; 
        const list = document.getElementById('list-container');
        const monthSelect = document.getElementById('month-select');
        const totalDisp = document.getElementById('total-val');
        const totalPagoDisp = document.getElementById('total-pago');
        const totalPendenteDisp = document.getElementById('total-pendente');
        const saveStatus = document.getElementById('save-status');
        const loader = document.getElementById('loader');
        
        let autoSaveTimer;
        let isSyncing = false; 

        monthSelect.value = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"][new Date().getMonth()];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { 
                navigator.serviceWorker.register('./sw.js').catch(() => {}); 
            });
        }

        async function fetchData() {
            isSyncing = true; 
            loader.style.display = "flex";
            try {
                // cache: 'reload' força a busca na rede ignorando o cache local do PWA
                const res = await fetch(`${GAS_URL}?month=${monthSelect.value}&t=${Date.now()}`, {
                    method: 'GET',
                    cache: 'reload'
                });
                const data = await res.json();
                
                list.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach(item => {
                        if(item.desc || item.val) {
                            list.appendChild(createRow(item.desc, item.val, item.status));
                        }
                    });
                } else {
                    addRow(); 
                }
                calculate();
            } catch (e) {
                console.error("Erro na busca:", e);
                saveStatus.innerText = "ERRO DE BUSCA";
                saveStatus.style.opacity = "1";
            } finally {
                loader.style.display = "none";
                // Delay para garantir que o DOM estabilizou
                setTimeout(() => { isSyncing = false; }, 1000);
            }
        }

        function createRow(d = '', v = '', s = 'PENDENTE') {
            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-800/50 last:border-0";
            const sClass = s === 'PAGO' ? 'pago' : 'pendente';
            tr.innerHTML = `
                <td><input type="text" class="row-desc" value="${d}" placeholder="..." oninput="planSave()"></td>
                <td><input type="number" step="0.01" class="row-val text-right font-mono" value="${v}" oninput="planSave()"></td>
                <td class="p-2 text-center">
                    <button onclick="toggleStatus(this)" class="status-btn ${sClass}">${s}</button>
                </td>
                <td><button onclick="removeRow(this)" class="text-gray-700 hover:text-red-500 font-bold pr-4">×</button></td>
            `;
            return tr;
        }

        function addRow() { list.appendChild(createRow()); }
        
        function removeRow(btn) { 
            btn.closest('tr').remove(); 
            if(list.children.length === 0) addRow(); 
            planSave(); 
        }
        
        function toggleStatus(btn) {
            const isPendente = btn.innerText === 'PENDENTE';
            btn.innerText = isPendente ? 'PAGO' : 'PENDENTE';
            btn.className = `status-btn ${isPendente ? 'pago' : 'pendente'}`;
            planSave();
        }

        function planSave() {
            calculate();
            if (isSyncing) return; 

            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(sendToSheets, 2000);
        }

        function calculate() {
            let totalGeral = 0, totalPago = 0, totalPendente = 0;
            document.querySelectorAll('#list-container tr').forEach(tr => {
                const val = parseFloat(tr.querySelector('.row-val').value);
                const status = tr.querySelector('.status-btn').innerText;
                if(!isNaN(val)) {
                    totalGeral += val;
                    if(status === 'PAGO') totalPago += val;
                    else totalPendente += val;
                }
            });
            totalDisp.innerText = totalGeral.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            totalPagoDisp.innerText = totalPago.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            totalPendenteDisp.innerText = totalPendente.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        async function sendToSheets() {
            if (isSyncing) return;
            
            const items = [];
            const rows = document.querySelectorAll('#list-container tr');
            rows.forEach(tr => {
                const d = tr.querySelector('.row-desc').value.trim();
                const v = tr.querySelector('.row-val').value;
                const s = tr.querySelector('.status-btn').innerText;
                if(d || v) items.push({ description: d, value: v, status: s });
            });

            // PROTEÇÃO: Não envia lista vazia se o app ainda não carregou os dados
            if (items.length === 0) return;

            saveStatus.style.opacity = "1";
            saveStatus.innerText = "SALVANDO...";
            
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ month: monthSelect.value, items: items })
                });
                setTimeout(() => {
                    saveStatus.innerText = "SINCRONIZADO";
                    setTimeout(() => saveStatus.style.opacity = "0", 2000);
                }, 500);
            } catch (e) {
                saveStatus.innerText = "ERRO";
            }
        }

        async function importMonthData() {
            const sourceMonth = document.getElementById('import-month-select').value;
            if (!sourceMonth || sourceMonth === monthSelect.value) return;
            
            if (!confirm(`Importar dados de ${sourceMonth}?`)) return;

            loader.style.display = "flex";
            try {
                const res = await fetch(`${GAS_URL}?month=${sourceMonth}&t=${Date.now()}`, { cache: 'no-cache' });
                const data = await res.json();
                if (data && data.length > 0) {
                    data.forEach(item => {
                        list.appendChild(createRow(item.desc, item.val, 'PENDENTE'));
                    });
                    planSave();
                }
            } catch (e) { alert("Erro ao importar"); }
            finally { 
                loader.style.display = "none";
                document.getElementById('import-month-select').value = "";
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
