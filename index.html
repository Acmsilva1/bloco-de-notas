<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCO DE ANOTAÇÕES (DESPESAS E CONTAS)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; font-family: 'Inter', sans-serif; color: #e5e7eb; }
        .notebook-page {
            background: #1f2937;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            min-height: 80vh;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            border: 1px solid #374151;
        }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid #374151; padding: 0; }
        th {
            background-color: #111827;
            text-align: left;
            padding: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9ca3af;
            border-bottom: 2px solid #4b5563;
        }
        input {
            background: transparent;
            border: none;
            outline: none;
            padding: 12px;
            width: 100%;
            display: block;
            color: #f3f4f6;
        }
        input:focus { background-color: #374151; }
        .total-footer { border-top: 3px double #4b5563; background: #111827; }
        .delete-col { width: 50px; text-align: center; }
        .value-col { width: 150px; }
        #save-indicator { font-size: 0.7rem; color: #10b981; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto notebook-page">
        <div class="p-6 border-b border-gray-700 bg-gray-900 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-gray-100 uppercase">BLOCO DE ANOTAÇÕES (DESPESAS E CONTAS)</h1>
            <span id="save-indicator">Sincronizado com Planilha</span>
        </div>

        <div class="flex-grow overflow-x-auto">
            <table id="main-table">
                <thead>
                    <tr>
                        <th class="pl-4">Descrição do Item</th>
                        <th class="value-col text-center">Valor (R$)</th>
                        <th class="delete-col"></th>
                    </tr>
                </thead>
                <tbody id="expense-list"></tbody>
            </table>
            
            <div class="p-4 border-t border-gray-700">
                <button onclick="addRow()" class="text-sm font-bold text-blue-400 hover:text-blue-300 flex items-center gap-1">
                    <span>+</span> ADICIONAR NOVA LINHA
                </button>
            </div>
        </div>

        <div class="total-footer p-6 mt-auto flex justify-between items-center">
            <span class="text-sm font-black uppercase tracking-widest text-gray-500">Total Geral:</span>
            <span id="grand-total" class="text-3xl font-mono font-bold text-green-400">R$ 0,00</span>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzRmEGyiMFnAAAuLQl9QDdi2JYN4q_v2puE0YX7l8eIKtuE81UvEcj7YDRQlscASqG3yg/exec";
        const expenseList = document.getElementById('expense-list');
        const grandTotalDisplay = document.getElementById('grand-total');
        const saveIndicator = document.getElementById('save-indicator');
        let saveTimeout;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        function createRow() {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-800 transition-colors';
            tr.innerHTML = `
                <td><input type="text" class="desc-input" placeholder="..." oninput="triggerAutoSave()"></td>
                <td class="value-col"><input type="number" step="0.01" class="val-input text-right font-medium" placeholder="0,00" oninput="onValueInput()"></td>
                <td class="delete-col"><button onclick="removeRow(this)" class="w-full h-full text-gray-500 hover:text-red-400 font-bold">×</button></td>
            `;
            return tr;
        }

        function addRow() {
            const row = createRow();
            expenseList.appendChild(row);
            row.querySelector('.desc-input').focus();
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
            calculate();
            if (expenseList.children.length === 0) addRow();
            triggerAutoSave();
        }

        function onValueInput() {
            calculate();
            triggerAutoSave();
        }

        function calculate() {
            const inputs = document.querySelectorAll('.val-input');
            let total = 0;
            inputs.forEach(i => {
                const v = parseFloat(i.value);
                if (!isNaN(v)) total += v;
            });
            grandTotalDisplay.innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function triggerAutoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(autoSave, 2000); // Aguarda 2 segundos de inatividade para salvar
        }

        async function autoSave() {
            const rows = document.querySelectorAll('#expense-list tr');
            const items = [];
            rows.forEach(row => {
                const desc = row.querySelector('.desc-input').value.trim();
                const val = parseFloat(row.querySelector('.val-input').value);
                if (desc && !isNaN(val)) items.push({ description: desc, value: val });
            });

            if (items.length === 0) return;

            try {
                saveIndicator.innerText = "Salvando...";
                saveIndicator.style.opacity = "1";
                
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ items: items })
                });

                setTimeout(() => {
                    saveIndicator.innerText = "Salvo na Planilha";
                    setTimeout(() => saveIndicator.style.opacity = "0", 2000);
                }, 500);
            } catch (e) {
                saveIndicator.innerText = "Erro ao sincronizar";
                saveIndicator.style.color = "#ef4444";
            }
        }

        window.onload = () => { addRow(); };
    </script>
</body>
</html>
